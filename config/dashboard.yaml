# 2D Panel Dashboard Configuration
# Edit this file to control what cards appear in each tab
#
# card_type options:
#   light        → light bulb card with brightness slider
#   sensor       → door/window/motion/garage binary sensor
#   curtain      → curtain/blind binary sensor
#   camera       → camera live feed card
#   lock         → lock entity
#   alarm        → alarm control panel
#   switch       → generic switch (add icon: "🌀" etc. to customize)
#   media-player → speaker/media player with volume
#   climate      → temperature/humidity sensor
#   thermostat   → climate thermostat
#   cover        → garage cover entity
#   fan          → fan entity
#   scene        → scene tile
#   automation   → automation tile

views:
  security:
    - entity: binary_sensor.demo_front_door
      card_type: sensor
    - entity: binary_sensor.demo_back_door
      card_type: sensor
    - entity: binary_sensor.demo_patio_door
      card_type: sensor
    - entity: binary_sensor.demo_motion
      card_type: sensor
    - entity: cover.demo_living_room_curtain
      card_type: curtain
    - entity: switch.demo_alarm_siren
      card_type: switch
      icon: "🚨"
    - entity: camera.rtsp2hls_driveway
      card_type: camera

  lights:
    - entity: light.demo_living_room
      card_type: light
    - entity: light.demo_bedroom
      card_type: light
    - entity: light.demo_kitchen
      card_type: light
    - entity: light.demo_kitchen_light
      card_type: light
    - entity: light.demo_dining_light
      card_type: light
    - entity: light.demo_office_light
      card_type: light
    - entity: switch.demo_fan
      card_type: switch
      icon: "🌀"

  music:
    - entity: media_player.demo_living_room_speaker
      card_type: media-player
    - entity: media_player.demo_bedroom_speaker
      card_type: media-player

  theater:
    - entity: switch.demo_tv
      card_type: switch
      icon: "📺"
    - entity: media_player.demo_living_room_speaker
      card_type: media-player

  climate:
    - entity: sensor.demo_temperature
      card_type: climate
    - entity: sensor.demo_humidity
      card_type: climate

  garage:
    - entity: cover.demo_garage_door
      card_type: cover

  scenes: []
