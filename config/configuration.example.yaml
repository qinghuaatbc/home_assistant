homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

auth:
  jwt_secret: "${HA_JWT_SECRET}"
  jwt_expiry: "24h"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  - domain: yamaha_avr
    mock: true
    receivers:
      - name: "Living Room Receiver"
        model: "RX-V685"
        zone: "Main_Zone"
        power: true
        volume: 0.35        # 0.0–1.0
        muted: false
        source: "HDMI1"
        sources: ["HDMI1", "HDMI2", "HDMI3", "AV1", "Audio1", "Spotify", "Bluetooth"]
      - name: "Bedroom Receiver"
        model: "RX-S602"
        zone: "Zone_2"
        power: false
        volume: 0.20
        muted: false
        source: "Spotify"
        sources: ["HDMI1", "HDMI2", "Audio1", "Spotify", "Bluetooth"]
  # To connect to real hardware instead:
  # - domain: yamaha_avr
  #   host: "192.168.1.50"
  #   port: 80
  #   scan_interval: 30


  - domain: weather
    city: "Vancouver, BC"
    temperature_unit: celsius
    wind_speed_unit: kmh
    scan_interval: 600

  - domain: light
    platforms:
      - name: demo
        entities:
          # ── glb_floor : which floor tab (1/2/3) shows this light
          # ── glb_mesh  : exact node name in the .glb → click the real 3D fixture
          # ── glb_pos   : [x, z] world coords for sphere indicator (no mesh)
          - entity_id: light.living_room
            name: "Living Room Light"
            brightness: 255
            glb_floor: 1
            glb_pos: [-4.5, -5.0]
          - entity_id: light.bedroom
            name: "Bedroom Light"
            brightness: 128
            glb_floor: 2
            glb_pos: [-4.5, -2.0]
          - entity_id: light.kitchen
            name: "Kitchen Light"
            glb_floor: 3
            glb_pos: [4.5, -1.0]
          # ── Lights that map to a named mesh object inside the .glb ──
          - entity_id: light.kitchen_light
            name: "Kitchen Ceiling"
            brightness: 200
            glb_floor: 1
            glb_mesh: "KITCHEN_LIGHT"
          - entity_id: light.dining_light
            name: "Dining Room Light"
            brightness: 255
            glb_floor: 1
            glb_mesh: "DINING_LIGHT"
          - entity_id: light.office_light
            name: "Office Light"
            brightness: 150
            glb_floor: 1
            glb_mesh: "OFFICE_LIGHT"

  - domain: switch
    platforms:
      - name: demo
        entities:
          - entity_id: switch.fan
            name: "Living Room Fan"
          - entity_id: switch.tv
            name: "TV Switch"
          - entity_id: switch.alarm_siren
            name: "Alarm Siren"
          - entity_id: switch.alarm_armed
            name: "Alarm Armed"

  - domain: sensor
    platforms:
      - name: demo
        entities:
          - entity_id: sensor.temperature
            name: "Indoor Temperature"
            unit_of_measurement: "°C"
            device_class: temperature
            state_class: measurement
          - entity_id: sensor.humidity
            name: "Indoor Humidity"
            unit_of_measurement: "%"
            device_class: humidity
            state_class: measurement

  - domain: camera
    cameras:
      - name: "Driveway"
        streams:
          - label: "SD"
            rtsp_url: "HA_CAMERA_DRIVEWAY_SD_URL"     # Set env HA_CAMERA_DRIVEWAY_SD_URL
          - label: "HD"
            rtsp_url: "HA_CAMERA_DRIVEWAY_HD_URL"     # Set env HA_CAMERA_DRIVEWAY_HD_URL
            default: true
      - name: "Camera 2"
        streams:
          - label: "SD"
            rtsp_url: "HA_CAMERA_CAMERA_2_SD_URL"     # Set env HA_CAMERA_CAMERA_2_SD_URL
          - label: "HD"
            rtsp_url: "HA_CAMERA_CAMERA_2_HD_URL"     # Set env HA_CAMERA_CAMERA_2_HD_URL
            default: true
      - name: "Camera 3"
        streams:
          - label: "SD"
            rtsp_url: "HA_CAMERA_CAMERA_3_SD_URL"     # Set env HA_CAMERA_CAMERA_3_SD_URL
          - label: "HD"
            rtsp_url: "HA_CAMERA_CAMERA_3_HD_URL"     # Set env HA_CAMERA_CAMERA_3_HD_URL
            default: true
      - name: "Camera 4"
        streams:
          - label: "SD"
            rtsp_url: "HA_CAMERA_CAMERA_4_SD_URL"     # Set env HA_CAMERA_CAMERA_4_SD_URL
          - label: "HD"
            rtsp_url: "HA_CAMERA_CAMERA_4_HD_URL"     # Set env HA_CAMERA_CAMERA_4_HD_URL
            default: true

  - domain: mqtt
    broker: "broker.hivemq.com"
    # port: 1883     # default
    entities:
      - topic: "light/01"
        name: "MQTT Light 01"
        type: light
        payload_on: "ON"
        payload_off: "OFF"
        payload_toggle: "TOGGLE"
      - topic: "light/02"
        name: "MQTT Light 02"
        type: light
      - topic: "switch/01"
        name: "MQTT Switch 01"
        type: switch

  - domain: lutron_caseta
    host: "192.168.1.167"
    port: 23          # default
    username: lutron  # default
    password: integration  # default
    devices:
      - id: 1
        name: "Living Room"
        type: light
      - id: 2
        name: "Kitchen"
        type: light
      - id: 3
        name: "Bedroom"
        type: light

  - domain: binary_sensor
    platforms:
      - name: demo
        entities:
          # ── Security sensors ──────────────────────────────────────────────
          # glb_mesh: named node in the .glb → highlights real 3D door object
          # glb_pos:  [x, z] fallback sphere for sensors without a named mesh
          - entity_id: binary_sensor.front_door
            name: "Front Door"
            device_class: door
            glb_floor: 1
            glb_mesh: "FRONT_DOOR"
          - entity_id: binary_sensor.back_door
            name: "Back Door"
            device_class: door
            glb_floor: 1
            # glb_pos: [0.0, -6.5]
          - entity_id: binary_sensor.garage_door
            name: "Garage Door"
            device_class: garage_door
            glb_floor: 1
            glb_mesh: "GARAGE_1"
          - entity_id: binary_sensor.office_door
            name: "Office Door"
            device_class: door
            glb_floor: 1
            glb_mesh: "OFFICE_DOOR"
          - entity_id: binary_sensor.kitchen_door
            name: "Kitchen Door"
            device_class: door
            glb_floor: 1
            glb_mesh: "KITCHEN_DOOR"
          - entity_id: binary_sensor.living_room_window
            name: "Living Room Window"
            device_class: window
            glb_floor: 1
            # glb_pos: [-5.0, 6.5]
          - entity_id: binary_sensor.bedroom_window
            name: "Bedroom Window"
            device_class: window
            glb_floor: 2
            # glb_pos: [-4.0, 6.5]
          - entity_id: binary_sensor.kitchen_window
            name: "Kitchen Window"
            device_class: window
            glb_floor: 1
            # glb_pos: [5.0, 6.5]
          - entity_id: binary_sensor.basement_window
            name: "Basement Window"
            device_class: window
            glb_floor: 3
            # glb_pos: [-4.0, 6.5]
          # ── Curtains / blinds — clip-plane roll-up same as garage door ─────
          - entity_id: binary_sensor.bedroom_blind
            name: "Bedroom Blind"
            device_class: blind
            glb_floor: 1
            glb_mesh: "FAMILY_BLIND"
            glb_pos: [-4.0, 5.5]
          # ── Alarm siren (switch) is in switch domain below ────────────────

  # ISY994 / Insteon — sample data (no real hardware required)
  - domain: isy994
    mock: true
    nodes:
      # Dimmable lights  (type 1.x.x.x → light)
      - address: "11 22 33 1"
        name: "Living Room Dimmer"
        type: "1.32.65.0"
        value: 200          # on at ~78% brightness
      - address: "11 22 33 2"
        name: "Kitchen Dimmer"
        type: "1.32.65.0"
        value: 0            # off
      - address: "11 22 66 1"
        name: "Master Bedroom Dimmer"
        type: "1.32.65.0"
        value: 128          # on at 50%
      # Switched loads  (type 2.x.x.x → switch)
      - address: "11 22 44 1"
        name: "Dining Room Switch"
        type: "2.55.65.0"
        value: 255          # on
      - address: "11 22 66 2"
        name: "Office Fan"
        type: "9.0.65.0"   # category 9 = fan/motor → switch
        value: 255          # on
      - address: "11 22 44 2"
        name: "Garage Door Relay"
        type: "15.0.65.0"  # category 15 = access control → switch
        value: 0            # closed / off
      # Sensors  (type 16.x.x.x → binary_sensor)
      - address: "11 22 55 1"
        name: "Front Door Sensor"
        type: "16.1.65.0"
        value: 0            # closed
      - address: "11 22 55 2"
        name: "Motion Sensor Hall"
        type: "16.1.65.0"
        value: 0            # no motion
  # To connect to real hardware instead, replace the block above with:
  # - domain: isy994
  #   host: "192.168.1.100"
  #   port: 80
  #   username: "admin"
  #   password: "admin"
  #   tls: false
  #   ignore_string: "_ignore_"
  #   scan_interval: 30
    platforms:
      - name: demo
        entities:
          - entity_id: binary_sensor.motion
            name: "Motion Sensor"
            device_class: motion
          - entity_id: binary_sensor.door
            name: "Front Door"
            device_class: door

# ── Automations ───────────────────────────────────────────────────────────────
automation: automations.yaml
