homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

auth:
  jwt_secret: "change-this-secret-in-production-at-least-32-chars"
  jwt_expiry: "30m"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  - domain: yamaha_avr
    mock: true
    receivers:
      - name: "Living Room Receiver"
        model: "RX-V685"
        zone: "Main_Zone"
        power: true
        volume: 0.35        # 0.0–1.0
        muted: false
        source: "HDMI1"
        sources: ["HDMI1", "HDMI2", "HDMI3", "AV1", "Audio1", "Spotify", "Bluetooth"]
      - name: "Bedroom Receiver"
        model: "RX-S602"
        zone: "Zone_2"
        power: false
        volume: 0.20
        muted: false
        source: "Spotify"
        sources: ["HDMI1", "HDMI2", "Audio1", "Spotify", "Bluetooth"]
  # To connect to real hardware instead:
  # - domain: yamaha_avr
  #   host: "192.168.1.50"
  #   port: 80
  #   scan_interval: 30


  - domain: weather
    city: "Vancouver, BC"
    temperature_unit: celsius
    wind_speed_unit: kmh
    scan_interval: 600

  - domain: light
    platforms:
      - name: demo
        entities:
          - entity_id: light.living_room
            name: "Living Room Light"
            brightness: 255
          - entity_id: light.bedroom
            name: "Bedroom Light"
            brightness: 128
          - entity_id: light.kitchen
            name: "Kitchen Light"

  - domain: switch
    platforms:
      - name: demo
        entities:
          - entity_id: switch.fan
            name: "Living Room Fan"
          - entity_id: switch.tv
            name: "TV Switch"

  - domain: sensor
    platforms:
      - name: demo
        entities:
          - entity_id: sensor.temperature
            name: "Indoor Temperature"
            unit_of_measurement: "°C"
            device_class: temperature
            state_class: measurement
          - entity_id: sensor.humidity
            name: "Indoor Humidity"
            unit_of_measurement: "%"
            device_class: humidity
            state_class: measurement

  - domain: camera
    cameras:
      - name: "Driveway"
        streams:
          - label: "SD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=1&subtype=1"
          - label: "HD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=1&subtype=0"
            default: true
      - name: "Camera 2"
        streams:
          - label: "SD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=2&subtype=1"
          - label: "HD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=2&subtype=0"
            default: true
      - name: "Camera 3"
        streams:
          - label: "SD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=3&subtype=1"
          - label: "HD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=3&subtype=0"
            default: true
      - name: "Camera 4"
        streams:
          - label: "SD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=4&subtype=1"
          - label: "HD"
            rtsp_url: "rtsp://admin:Vancouver007@2370palmerstone.ddns.net:554/cam/realmonitor?channel=4&subtype=0"
            default: true

  - domain: mqtt
    broker: "broker.hivemq.com"
    # port: 1883     # default
    entities:
      - topic: "light/01"
        name: "MQTT Light 01"
        type: light
        payload_on: "ON"
        payload_off: "OFF"
        payload_toggle: "TOGGLE"
      - topic: "light/02"
        name: "MQTT Light 02"
        type: light
      - topic: "switch/01"
        name: "MQTT Switch 01"
        type: switch

  - domain: lutron_caseta
    host: "192.168.1.167"
    port: 23          # default
    username: lutron  # default
    password: integration  # default
    devices:
      - id: 1
        name: "Living Room"
        type: light
      - id: 2
        name: "Kitchen"
        type: light
      - id: 3
        name: "Bedroom"
        type: light

  - domain: binary_sensor

  # ISY994 / Insteon — sample data (no real hardware required)
  - domain: isy994
    mock: true
    nodes:
      # Dimmable lights  (type 1.x.x.x → light)
      - address: "11 22 33 1"
        name: "Living Room Dimmer"
        type: "1.32.65.0"
        value: 200          # on at ~78% brightness
      - address: "11 22 33 2"
        name: "Kitchen Dimmer"
        type: "1.32.65.0"
        value: 0            # off
      - address: "11 22 66 1"
        name: "Master Bedroom Dimmer"
        type: "1.32.65.0"
        value: 128          # on at 50%
      # Switched loads  (type 2.x.x.x → switch)
      - address: "11 22 44 1"
        name: "Dining Room Switch"
        type: "2.55.65.0"
        value: 255          # on
      - address: "11 22 66 2"
        name: "Office Fan"
        type: "9.0.65.0"   # category 9 = fan/motor → switch
        value: 255          # on
      - address: "11 22 44 2"
        name: "Garage Door Relay"
        type: "15.0.65.0"  # category 15 = access control → switch
        value: 0            # closed / off
      # Sensors  (type 16.x.x.x → binary_sensor)
      - address: "11 22 55 1"
        name: "Front Door Sensor"
        type: "16.1.65.0"
        value: 0            # closed
      - address: "11 22 55 2"
        name: "Motion Sensor Hall"
        type: "16.1.65.0"
        value: 0            # no motion
  # To connect to real hardware instead, replace the block above with:
  # - domain: isy994
  #   host: "192.168.1.100"
  #   port: 80
  #   username: "admin"
  #   password: "admin"
  #   tls: false
  #   ignore_string: "_ignore_"
  #   scan_interval: 30
    platforms:
      - name: demo
        entities:
          - entity_id: binary_sensor.motion
            name: "Motion Sensor"
            device_class: motion
          - entity_id: binary_sensor.door
            name: "Front Door"
            device_class: door

# ── Automations ───────────────────────────────────────────────────────────────
automation:
  - id: "motion_light"
    alias: "Turn on living room light when motion detected"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.motion
        to: "on"
    condition:
      - condition: time
        after: "07:00"
        before: "23:00"
    action:
      - action: call_service
        service: light.turn_on
        target:
          entity_id: light.living_room
        data:
          brightness: 200

  - id: "night_dim"
    alias: "Dim bedroom light at 10pm"
    mode: single
    trigger:
      - platform: time
        at: "22:00"
    action:
      - action: condition
        conditions:
          - condition: state
            entity_id: light.bedroom
            state: "on"
        then:
          - action: call_service
            service: light.turn_on
            target:
              entity_id: light.bedroom
            data:
              brightness: 50

  - id: "high_temp_alert"
    alias: "Turn on fan when temperature is high"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.temperature
        above: 28
    action:
      - action: call_service
        service: switch.turn_on
        target:
          entity_id: switch.fan
