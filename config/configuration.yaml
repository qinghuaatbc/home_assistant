# Home Assistant configuration
# Uncomment the `demo` integration block below to enable demo/test devices.

homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

auth:
  jwt_secret: "${HA_JWT_SECRET}"
  jwt_expiry: "24h"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  - domain: mqtt
    broker: "broker.hivemq.com"

