# Home Assistant configuration

homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

auth:
  jwt_secret: "${HA_JWT_SECRET}"
  jwt_expiry: "24h"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  # Demo devices
  - domain: demo

  # IP camera via RTSP
  - domain: rtsp2hls
    cameras:
      - name: Driveway
        streams:
          - label: HD
            rtsp_url: "rtsp://admin:Vancouver007@2264inglewood.ddns.net:554/Streaming/Channels/201"

automation: automations.yaml
