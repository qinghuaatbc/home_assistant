# Home Assistant production configuration
# Demo data is in demo.yaml — remove that file or set HA_DEMO=false to disable.

homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

auth:
  jwt_secret: "${HA_JWT_SECRET}"
  jwt_expiry: "24h"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  # ── Real hardware integrations (configure as needed) ──────────────────────

  # - domain: yamaha_avr
  #   host: "192.168.1.50"
  #   port: 80
  #   scan_interval: 30

  # - domain: camera
  #   cameras:
  #     - name: "Driveway"
  #       streams:
  #         - label: "SD"
  #           rtsp_url: "HA_CAMERA_DRIVEWAY_SD_URL"
  #         - label: "HD"
  #           rtsp_url: "HA_CAMERA_DRIVEWAY_HD_URL"
  #           default: true

  - domain: mqtt
    broker: "broker.hivemq.com"
    entities:
      - topic: "light/01"
        name: "MQTT Light 01"
        type: light
        payload_on: "ON"
        payload_off: "OFF"
        payload_toggle: "TOGGLE"
      - topic: "light/02"
        name: "MQTT Light 02"
        type: light
      - topic: "switch/01"
        name: "MQTT Switch 01"
        type: switch

  # - domain: lutron_caseta
  #   host: "192.168.1.167"
  #   port: 23
  #   devices:
  #     - id: 1
  #       name: "Living Room"
  #       type: light
