# Home Assistant configuration

homeassistant:
  name: "My Home"
  latitude: 39.9042
  longitude: 116.4074
  elevation: 43
  unit_system: metric
  time_zone: "Asia/Shanghai"
  country: "CN"
  currency: "CNY"

http:
  port: 8123
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:8080"

auth:
  jwt_secret: "${HA_JWT_SECRET}"
  jwt_expiry: "24h"

database:
  type: "better-sqlite3"
  database: "ha.db"
  logging: false

logger:
  level: "info"

integrations:
  # 本地 MQTT（主）— 安装: docker run -d --name mqtt -p 1883:1883 eclipse-mosquitto
  - domain: mqtt
    broker: "localhost"

  # 公共 MQTT（备）— 仅手动实体，关闭 auto-discovery
  - domain: mqtt
    broker: "broker.hivemq.com"
    discovery_prefix: ""

  # Demo devices — comment out to disable
  - domain: demo

automation: automations.yaml
